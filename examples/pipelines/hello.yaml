name: hello
description: minimal pipeline-runner example

cli:
  arguments:
    - name: name
      type: str
      required: true
      help: name to greet

workflow:
  entry: greet
  nodes:
    - name: greet
      type: command
      exec: python
      args:
        - -c
        - "import json; print(json.dumps(dict(message='hello {name}')))"
      outputs:
        - message
    - name: show
      type: print
      keys:
        - message
  edges:
    - from: greet
      to: show
